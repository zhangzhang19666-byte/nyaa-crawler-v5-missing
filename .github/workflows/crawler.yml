name: V5 Missing-ID Crawler Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    concurrency:
      group: v5-crawler-loop
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install curl_cffi beautifulsoup4 requests

      - id: check
        run: |
          echo "has_missing=$(python3 check_remaining.py)" >> $GITHUB_OUTPUT

      - if: steps.check.outputs.has_missing == 'true'
        run: |
          python3 v5_nyaa_missing_crawler.py \
            --missing-dir=. \
            --workers=5 \
            --batch-size=1100 \
            --batch-timeout=540

      - if: steps.check.outputs.has_missing == 'true'
        run: |
          git config user.email "bot@users.noreply.github.com"
          git config user.name "bot"
          git add v5_progress.json nyaa_v5_missing_*.jsonl || true
          git diff --staged --quiet || git commit -m "auto: v5 progress"
          git push

      - if: steps.check.outputs.has_missing == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(python3 check_remaining.py)" = "false" ]; then
            echo "All done. Loop stops."
            exit 0
          fi
          echo "Next in 60s..."
          sleep 60
          gh workflow run "V5 Missing-ID Crawler Loop" --ref main
