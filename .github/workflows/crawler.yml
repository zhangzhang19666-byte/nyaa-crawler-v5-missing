name: V5 Crawler Loop

on:
  repository_dispatch:
    types: [run-crawler]
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    concurrency:
      group: v5-crawler-loop
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install curl_cffi beautifulsoup4 requests
      - id: check
        run: |
          HAS=$(python -c "
import json
from pathlib import Path
p='v5_progress.json'
prog=json.load(open(p)) if Path(p).exists() else {}
for f in sorted(Path('.').glob('missing_*.txt')):
    d=prog.get(f.name,0)
    t=len([l for l in open(f) if l.strip().isdigit()])
    if d<t: print('true');exit(0)
print('false')
")
          echo "has_missing=$HAS" >> $GITHUB_OUTPUT
      - if: steps.check.outputs.has_missing == 'true'
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          ARGS="--missing-dir=. --workers=5 --batch-size=355 --batch-timeout=540"
          [ -n "$PROXY_URL" ] && ARGS="$ARGS --proxy $PROXY_URL"
          python v5_nyaa_missing_crawler.py $ARGS
      - if: steps.check.outputs.has_missing == 'true'
        run: |
          git config user.email "bot@users.noreply.github.com"
          git config user.name "bot"
          git add v5_progress.json nyaa_v5_missing_*.jsonl || true
          git diff --staged --quiet || git commit -m "auto: progress"
          git push
      - if: steps.check.outputs.has_missing == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALL=$(python -c "
import json
from pathlib import Path
p='v5_progress.json'
prog=json.load(open(p)) if Path(p).exists() else {}
for f in sorted(Path('.').glob('missing_*.txt')):
    d=prog.get(f.name,0)
    t=len([l for l in open(f) if l.strip().isdigit()])
    if d<t: print('false');exit(0)
print('true')
")
          [ "$ALL" = "true" ] && echo "All done" && exit 0
          sleep 60
          echo "Triggering next run..."
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/zhangzhang19666-byte/nyaa-crawler-v5-missing/dispatches \
            -d '{"event_type":"run-crawler"}'
